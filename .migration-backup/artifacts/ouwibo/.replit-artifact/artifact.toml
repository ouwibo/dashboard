kind = "web"
previewPath = "/"
title = "Ouwibo Dashboard"
version = "1.0.0"
id = "artifacts/ouwibo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24060

[services.development]
run = "pnpm --filter @workspace/ouwibo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ouwibo", "run", "build" ]
publicDir = "artifacts/ouwibo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24060"
BASE_PATH = "/"
