openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Airdrop Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: airdrops
    description: Airdrop operations
  - name: airdrop-tasks
    description: Airdrop task operations
  - name: stats
    description: Dashboard stats
  - name: activity
    description: Activity feed
  - name: chat
    description: AI chat

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /airdrops:
    get:
      operationId: listAirdrops
      tags: [airdrops]
      summary: List all airdrops
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, upcoming, ended, potential]
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: chain
          in: query
          required: false
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of airdrops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Airdrop"
    post:
      operationId: createAirdrop
      tags: [airdrops]
      summary: Create an airdrop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AirdropInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Airdrop"

  /airdrops/{id}:
    get:
      operationId: getAirdrop
      tags: [airdrops]
      summary: Get an airdrop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Airdrop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Airdrop"
        "404":
          description: Not found
    patch:
      operationId: updateAirdrop
      tags: [airdrops]
      summary: Update an airdrop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AirdropUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Airdrop"
    delete:
      operationId: deleteAirdrop
      tags: [airdrops]
      summary: Delete an airdrop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /airdrops/{id}/tasks:
    get:
      operationId: listAirdropTasks
      tags: [airdrop-tasks]
      summary: List tasks for an airdrop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AirdropTask"
    post:
      operationId: createAirdropTask
      tags: [airdrop-tasks]
      summary: Create a task for an airdrop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AirdropTaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AirdropTask"

  /airdrop-tasks/{id}:
    patch:
      operationId: updateAirdropTask
      tags: [airdrop-tasks]
      summary: Update an airdrop task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AirdropTaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AirdropTask"
    delete:
      operationId: deleteAirdropTask
      tags: [airdrop-tasks]
      summary: Delete an airdrop task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: Get recent activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /chat:
    post:
      operationId: sendChat
      tags: [chat]
      summary: Send a message to AI chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Airdrop:
      type: object
      required: [id, name, slug, category, chain, status, difficulty, isFeatured, isVerified, participantsCount, taskCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        logoColor:
          type: string
        logoInitial:
          type: string
        websiteUrl:
          type: ["string", "null"]
        twitterUrl:
          type: ["string", "null"]
        telegramUrl:
          type: ["string", "null"]
        discordUrl:
          type: ["string", "null"]
        category:
          type: string
          enum: [defi, nft, layer1, layer2, gaming, dao, infrastructure, wallet, exchange]
        chain:
          type: string
        status:
          type: string
          enum: [active, upcoming, ended, potential]
        rewardEstimate:
          type: ["string", "null"]
        totalValue:
          type: ["string", "null"]
        difficulty:
          type: string
          enum: [easy, medium, hard]
        isFeatured:
          type: boolean
        isVerified:
          type: boolean
        participantsCount:
          type: integer
        taskCount:
          type: integer
        startDate:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]
        createdAt:
          type: string

    AirdropInput:
      type: object
      required: [name, slug, category, chain, status, difficulty]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        description:
          type: string
        logoColor:
          type: string
        logoInitial:
          type: string
        websiteUrl:
          type: string
        twitterUrl:
          type: string
        telegramUrl:
          type: string
        discordUrl:
          type: string
        category:
          type: string
          enum: [defi, nft, layer1, layer2, gaming, dao, infrastructure, wallet, exchange]
        chain:
          type: string
        status:
          type: string
          enum: [active, upcoming, ended, potential]
        rewardEstimate:
          type: string
        totalValue:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        isFeatured:
          type: boolean
        isVerified:
          type: boolean
        participantsCount:
          type: integer
        taskCount:
          type: integer
        startDate:
          type: string
        endDate:
          type: string

    AirdropUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
        description:
          type: string
        logoColor:
          type: string
        logoInitial:
          type: string
        websiteUrl:
          type: string
        twitterUrl:
          type: string
        telegramUrl:
          type: string
        discordUrl:
          type: string
        category:
          type: string
          enum: [defi, nft, layer1, layer2, gaming, dao, infrastructure, wallet, exchange]
        chain:
          type: string
        status:
          type: string
          enum: [active, upcoming, ended, potential]
        rewardEstimate:
          type: string
        totalValue:
          type: string
        difficulty:
          type: string
          enum: [easy, medium, hard]
        isFeatured:
          type: boolean
        isVerified:
          type: boolean
        participantsCount:
          type: integer
        taskCount:
          type: integer
        startDate:
          type: string
        endDate:
          type: string

    AirdropTask:
      type: object
      required: [id, airdropId, title, taskType, isRequired, sortOrder, createdAt]
      properties:
        id:
          type: integer
        airdropId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        link:
          type: ["string", "null"]
        taskType:
          type: string
          enum: [follow_twitter, join_telegram, join_discord, complete_quiz, stake, bridge, swap, provide_liquidity, register, other]
        isRequired:
          type: boolean
        sortOrder:
          type: integer
        createdAt:
          type: string

    AirdropTaskInput:
      type: object
      required: [title, taskType]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        link:
          type: string
        taskType:
          type: string
          enum: [follow_twitter, join_telegram, join_discord, complete_quiz, stake, bridge, swap, provide_liquidity, register, other]
        isRequired:
          type: boolean
        sortOrder:
          type: integer

    AirdropTaskUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        link:
          type: string
        taskType:
          type: string
          enum: [follow_twitter, join_telegram, join_discord, complete_quiz, stake, bridge, swap, provide_liquidity, register, other]
        isRequired:
          type: boolean
        sortOrder:
          type: integer

    DashboardStats:
      type: object
      required: [totalAirdrops, activeAirdrops, upcomingAirdrops, endedAirdrops, totalTasks, featuredCount]
      properties:
        totalAirdrops:
          type: integer
        activeAirdrops:
          type: integer
        upcomingAirdrops:
          type: integer
        endedAirdrops:
          type: integer
        totalTasks:
          type: integer
        featuredCount:
          type: integer

    ActivityItem:
      type: object
      required: [id, type, message, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        message:
          type: string
        actorName:
          type: ["string", "null"]
        createdAt:
          type: string

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    ChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"

    ChatResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
